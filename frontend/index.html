<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Webhook API Tester</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>API Validation Tester</h1>

    <form id="testForm">
      <label>Email:</label>
      <input type="email" id="email" required />

      <label>API Endpoint URL:</label>
      <input type="text" id="url" placeholder="http://localhost:3000/webhook" required />

      <button type="submit">Validate API</button>
    </form>

    <h2>Response:</h2>
    <pre id="result"></pre>
  </div>

  <script src="script.js"></script>
</body>
</html>
