<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webhook API Validator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="card intro">
      <p class="tag">Application Task Validator</p>
      <h1>Webhook API Tester</h1>
      <p class="muted">
        Enter your email and deployed webhook URL. The validator will POST a payload like
        <code>{"data":"example"}</code> and expects <code>{"word":["a","e","e","l","m","p","x"]}</code>.
      </p>
    </section>

    <section class="card">
      <form id="testForm">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />

        <label for="url">API Endpoint URL</label>
        <input type="url" id="url" placeholder="https://your-domain.com/webhook" required />
        <p class="muted small">Use the full URL including <code>https://</code>.</p>

        <button id="submitBtn" type="submit">Validate Endpoint</button>
      </form>
    </section>

    <section class="card">
      <div class="result-head">
        <h2>Response</h2>
        <span id="statusBadge" class="badge">Idle</span>
      </div>
      <pre id="result">No response yet.</pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
